coverage:
  precision: 0
  round: down
  range: 70..90
  status:
    project:
      default:
        target: 70%
        threshold: 5%
        informational: true
    patch:
      default:
        target: 50%
        threshold: 10%
        informational: true

ignore:
  - "dist/**"
  - "node_modules/**"
  - "coverage/**"
  - "**/*.test.js"
  - "**/*.spec.js"
  - ".github/**"
  - "tests/**"
  - "docs/**"
  - "*.config.js"
  - "*.config.cjs"

comment:
  layout: "diff,flags,files"
  behavior: default
  require_changes: true

flags:
  features:
    paths:
      - "src/features/**/*.js"
  core:
    paths:
      - "*.js"
      - "src/**/*.js"
      - "!src/features/**"

github_checks:
  annotations: true
